name: "Specific dates auto-resolve"
description: >
  After setting up line and aim, user gives an absolute date range. The time
  should resolve cleanly (no interrupt) and build_plan_message should run.
steps:
  - user: "tell me about the vinayaka"
  - user: "average cost by fruit"
  - user: "from 2026-05-01 to 2026-05-31"
    expect:
      interrupt_node: "build_plan_message"
      trace_contains:
        - event_type: "llm_output"
          node: "normalize_time"
