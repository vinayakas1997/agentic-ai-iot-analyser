name: "Japan three-table join aim"
description: >
  User asks about japan_fruit and gives an aim spanning all three datasets:
  sales, inventory, and supplier quality.
steps:
  - user: "tell me about the japan_fruit"
    expect:
      phase: "ask"
      trace_contains:
        - event_type: "routing"
          node: "route_after_analyst"
          data:
            target: "tool_generate_plans"

  - user: "show me the relationship between quality scores and sales volume by supplier"
    expect:
      trace_contains:
        - event_type: "llm_output"
          node: "analyst"
