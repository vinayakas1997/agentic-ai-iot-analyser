services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: manager_agent
      POSTGRES_PASSWORD: manager_agent_pass
      POSTGRES_DB: manager_agent_db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U manager_agent -d manager_agent_db"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - edas-net

  db-init:
    build: ./mock-database-fill
    environment:
      DB_URL: "postgresql+asyncpg://manager_agent:manager_agent_pass@db:5432/manager_agent_db"
    depends_on:
      db:
        condition: service_healthy
    restart: "no"
    networks:
      - edas-net

  backend:
    build: ./backend
    ports:
      - "7010:7010"
    environment:
      DB_URL: "postgresql+asyncpg://manager_agent:manager_agent_pass@db:5432/manager_agent_db"
      VLLM_BASE_URL: "${VLLM_BASE_URL:-http://172.21.0.1:8009/v1}"
      LLM_MODEL: "${LLM_MODEL:-qwen36-35B}"
      CORS_ORIGINS: "http://localhost:7008,http://localhost"
    depends_on:
      db:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    networks:
      - edas-net

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: "${VITE_API_URL:-http://localhost:7010}"
    ports:
      - "7008:80"
    depends_on:
      - backend
    networks:
      - edas-net

networks:
  edas-net:
    driver: bridge
