services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: edas-backend
    restart: unless-stopped
    env_file: backend/.env
    ports:
      - "7009:7009"
    volumes:
      - ./backend:/app
      - ../data:/data
    command: uvicorn api.server:app --host 0.0.0.0 --port 7009 --reload
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: edas-frontend
    restart: unless-stopped
    ports:
      - "7008:7008"
    environment:
      VITE_API_URL: http://localhost:7009
      VITE_WS_URL: ws://localhost:7009
      VITE_DEFAULT_USER_ID: "98765"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0 --port 7008
    depends_on:
      - backend
