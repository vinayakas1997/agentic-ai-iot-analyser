name: "No time mentioned skips resolve_time entirely"
description: >
  Without any time mention, tool_resolve_time should never be invoked.
  The plan is built directly after aim extraction.
steps:
  - user: "tell me about the vinayaka"
    expect:
      phase: "ask"

  - user: "average cost by fruit"
    expect:
      phase: "ask"
      trace_does_not_contain:
        - event_type: "routing"
          node: "route_after_analyst"
          data:
            target: "tool_resolve_time"
