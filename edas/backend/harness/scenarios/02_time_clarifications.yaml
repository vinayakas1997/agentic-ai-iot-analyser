name: "Time clarification scenarios"
description: >
  Tests various time-filtering scenarios to ensure the LLM correctly identifies
  ambiguous vs. unambiguous time phrases and routes appropriately.
cases:
  - name: "Ambiguous last month gets clarification"
    steps:
      - user: "tell me about the vinayaka"
      - user: "average cost by fruit"
      - user: "the last month"
    expect:
      interrupt_node: "ask_time_ambiguous"
      trace_llm_node: "normalize_time"

  - name: "Specific dates auto-resolve"
    steps:
      - user: "tell me about the vinayaka"
      - user: "average cost by fruit"
      - user: "from 2026-05-01 to 2026-05-31"
    expect:
      interrupt_node: "build_plan_message"
      trace_llm_node: "normalize_time"

  - name: "No time mentioned skips normalize entirely"
    steps:
      - user: "tell me about the vinayaka"
      - user: "average cost by fruit"
    expect:
      interrupt_node: "build_plan_message"
      trace_does_not_contain:
        - event_type: "llm_output"
          node: "normalize_time"
